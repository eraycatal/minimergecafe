<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Mini Merge Cafe</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: "Trebuchet MS", Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, #fff8d9 0, transparent 34%),
        radial-gradient(circle at bottom right, #ffd2dc 0, transparent 36%),
        linear-gradient(180deg, #fff3e8, #ffdcbf);
      color: #5a3825;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    button {
      font-weight: 900;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .app {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      padding: 12px 12px 94px;
      background:
        linear-gradient(rgba(255, 243, 232, 0.88), rgba(255, 243, 232, 0.94)),
        radial-gradient(circle at 8% 16%, rgba(76, 175, 122, 0.14), transparent 24%),
        radial-gradient(circle at 92% 50%, rgba(255, 159, 67, 0.16), transparent 24%);
      overflow-x: hidden;
      position: relative;
    }

    .topbar {
      background: rgba(255,255,255,0.85);
      border: 2px solid #f4cf9c;
      border-radius: 26px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 8px 18px rgba(90,56,37,0.12);
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #fff3e8;
      border: 3px solid #d69456;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 29px;
      box-shadow: inset 0 2px 8px rgba(90,56,37,0.12);
    }

    h1 {
      margin: 0;
      flex: 1;
      text-align: center;
      font-size: 25px;
      color: #653719;
      letter-spacing: 1px;
    }

    .gear {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #fff8ef;
      border: 2px solid #f1c27d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 23px;
      box-shadow: 0 4px 10px rgba(90,56,37,0.12);
      cursor: pointer;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .stat-pill {
      background: #fff8ef;
      border: 2px solid #f1c27d;
      border-radius: 18px;
      padding: 8px 5px;
      font-size: 15px;
      font-weight: 900;
      text-align: center;
      box-shadow: inset 0 2px 6px rgba(90,56,37,0.06);
    }

    .orders-section {
      background: rgba(255,255,255,0.88);
      border: 2px solid #f4cf9c;
      border-radius: 24px;
      padding: 12px;
      box-shadow: 0 8px 18px rgba(90,56,37,0.1);
      margin-bottom: 13px;
    }

    .section-ribbon {
      width: fit-content;
      margin: -25px auto 10px;
      background: linear-gradient(180deg, #ff8fa8, #ef5d7a);
      color: white;
      padding: 8px 28px;
      border-radius: 14px;
      font-weight: 900;
      font-size: 17px;
      box-shadow: 0 5px 12px rgba(90,56,37,0.18);
      border: 2px solid rgba(255,255,255,0.55);
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    .customers {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 3px 2px 4px;
      scroll-snap-type: x mandatory;
    }

    .customers::-webkit-scrollbar {
      display: none;
    }

    .customer-card {
      min-width: 138px;
      background: #fff7e8;
      border: 2px solid #f1c27d;
      border-radius: 19px;
      padding: 10px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(90,56,37,0.1);
      scroll-snap-align: start;
      position: relative;
      transition: 0.2s;
    }

    .customer-card.ready {
      border-color: #4caf7a;
      box-shadow: 0 0 0 3px rgba(76,175,122,0.18), 0 5px 12px rgba(90,56,37,0.12);
    }

    .ready-check {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #4caf7a;
      color: white;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid white;
    }

    .avatar {
      font-size: 36px;
      height: 38px;
      margin-bottom: 3px;
    }

    .order-emoji {
      font-size: 34px;
      margin: 2px 0;
    }

    .order-name {
      font-weight: 900;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .reward {
      display: flex;
      justify-content: center;
      gap: 8px;
      font-weight: 900;
      font-size: 13px;
      margin-bottom: 7px;
      flex-wrap: wrap;
    }

    .serve-btn {
      background: linear-gradient(180deg, #78c943, #43a92c);
      border: 2px solid #328c1f;
      box-shadow: 0 4px 0 #2c761d;
      color: white;
      padding: 8px 10px;
      border-radius: 13px;
      font-size: 14px;
      width: 100%;
    }

    .serve-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #2c761d;
    }

    .board-frame {
      background: linear-gradient(180deg, #bc7337, #8c4d27);
      border-radius: 28px;
      padding: 12px;
      border: 4px solid #6f391b;
      box-shadow:
        inset 0 4px 8px rgba(255,255,255,0.25),
        inset 0 -8px 12px rgba(0,0,0,0.18),
        0 10px 22px rgba(90,56,37,0.25);
      margin-bottom: 12px;
    }

    .board-label {
      width: fit-content;
      margin: -2px auto 10px;
      background: linear-gradient(180deg, #9a552b, #713717);
      color: white;
      padding: 8px 38px;
      border-radius: 12px;
      font-weight: 900;
      letter-spacing: 1px;
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.18);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 7px;
      background: rgba(90,56,37,0.13);
      border-radius: 20px;
      padding: 8px;
    }

    .cell {
      aspect-ratio: 1 / 1;
      background: linear-gradient(180deg, #fff1d9, #f7d5aa);
      border: 2px solid #e4af74;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      font-size: 30px;
      box-shadow:
        inset 0 3px 5px rgba(255,255,255,0.6),
        inset 0 -3px 6px rgba(90,56,37,0.09);
      cursor: pointer;
      transition: 0.16s;
    }

    .cell:hover {
      transform: translateY(-1px);
    }

    .cell.selected {
      outline: 4px solid #ffb703;
      box-shadow: 0 0 16px rgba(255,183,3,0.75);
    }

    .cell.drag-over {
      outline: 4px solid #4caf7a;
    }

    .machine {
      color: white;
      border: 3px solid #5a3825;
      box-shadow: 0 5px 12px rgba(90,56,37,0.25);
    }

    .drink-machine {
      background: linear-gradient(180deg, #79c7e8, #2e8ebb);
    }

    .dessert-machine {
      background: linear-gradient(180deg, #ffb6c8, #e6789a);
    }

    .machine-label,
    .item-name {
      position: absolute;
      bottom: 2px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 6.5px;
      font-weight: 900;
      color: #5a3825;
      pointer-events: none;
    }

    .machine-label {
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.35);
    }

    .item {
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-user-drag: none;
      touch-action: none;
      animation: itemFloat 2s infinite ease-in-out;
    }

    .machine,
    .cell {
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
    }

    .drag-ghost {
      position: fixed;
      left: 0;
      top: 0;
      width: 58px;
      height: 58px;
      border-radius: 16px;
      background: rgba(255, 248, 239, 0.96);
      border: 3px solid #f1c27d;
      box-shadow: 0 16px 28px rgba(90,56,37,0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      pointer-events: none;
      z-index: 999;
      transform: translate(-50%, -50%);
    }

    .info-note {
      background: #fff7e8;
      border: 2px solid #f1c27d;
      border-radius: 16px;
      padding: 10px;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 800;
      color: #5a3825;
      margin-top: 8px;
    }

    @keyframes itemFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    .pop {
      animation: pop 0.35s ease-out;
    }

    @keyframes pop {
      0% { transform: scale(0.2) rotate(-12deg); opacity: 0; }
      65% { transform: scale(1.18) rotate(5deg); opacity: 1; }
      100% { transform: scale(1); }
    }

    .lucky-cell {
      border-color: #ffb703;
      box-shadow: 0 0 16px rgba(255,183,3,0.8);
      background: linear-gradient(180deg, #fff5bd, #ffd36e);
    }

    .mini-badge {
      position: absolute;
      top: -8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      border: 2px solid white;
      box-shadow: 0 3px 8px rgba(0,0,0,0.18);
      z-index: 3;
    }

    .badge-lucky { left: -8px; background: #ffb703; }
    .badge-star { left: 16px; background: #8338ec; }
    .badge-ready { right: -8px; background: #4caf7a; }

    .hint-bubble {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.92);
      border: 2px solid #f4cf9c;
      border-radius: 22px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 6px 14px rgba(90,56,37,0.12);
    }

    .helper { font-size: 34px; }
    .message { flex: 1; font-weight: 900; font-size: 14px; line-height: 1.35; }
    .bulb { font-size: 27px; }

    .bottom-nav {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 10px;
      width: min(456px, calc(100% - 18px));
      background: rgba(255,248,239,0.96);
      border: 2px solid #f1c27d;
      border-radius: 26px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding: 7px;
      box-shadow: 0 -8px 24px rgba(90,56,37,0.18);
      z-index: 50;
    }

    .nav-btn {
      background: transparent;
      color: #5a3825;
      border: none;
      box-shadow: none;
      padding: 7px 4px;
      border-radius: 18px;
      font-size: 24px;
      font-weight: 900;
    }

    .nav-btn.active {
      background: linear-gradient(180deg, #ffb6c8, #ff8fa8);
      color: #7b2b42;
    }

    .nav-btn span {
      display: block;
      font-size: 11px;
      margin-top: 2px;
    }

    .sheet {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: -100%;
      width: min(456px, 100%);
      max-height: 72vh;
      background: #fff8ef;
      border-radius: 28px 28px 0 0;
      border: 3px solid #f1c27d;
      box-shadow: 0 -14px 35px rgba(90,56,37,0.28);
      padding: 16px;
      z-index: 80;
      overflow-y: auto;
      transition: bottom 0.28s ease;
    }

    .sheet.show { bottom: 0; }

    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 13px;
    }

    .sheet-header h2 {
      margin: 0;
      font-size: 22px;
      color: #653719;
    }

    .close-btn {
      width: auto;
      background: #ff8fa8;
      border: 2px solid #d95776;
      padding: 8px 13px;
      border-radius: 14px;
      color: white;
      font-weight: 900;
    }

    .panel-card {
      background: white;
      border: 2px solid #f1c27d;
      border-radius: 20px;
      padding: 13px;
      margin-bottom: 11px;
      box-shadow: 0 5px 13px rgba(90,56,37,0.09);
    }

    .panel-card h3 {
      margin: 0 0 8px;
      color: #653719;
      font-size: 18px;
    }

    .panel-card p {
      margin: 5px 0;
      font-size: 14px;
      line-height: 1.35;
    }

    .green-btn,
    .orange-btn,
    .blue-btn {
      color: white;
      border-radius: 14px;
      padding: 10px;
      width: 100%;
      margin-top: 7px;
      font-weight: 900;
    }

    .green-btn {
      background: linear-gradient(180deg, #78c943, #43a92c);
      border: 2px solid #328c1f;
    }

    .orange-btn {
      background: linear-gradient(180deg, #ffb24a, #ff8c1a);
      border: 2px solid #d96e00;
    }

    .blue-btn {
      background: linear-gradient(180deg, #79c7e8, #2e8ebb);
      border: 2px solid #1c6f97;
    }

    .renovation-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.48);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
      padding: 12px;
    }

    .renovation-modal.show { display: flex; }

    .renovation-card {
      width: min(456px, 100%);
      max-height: 94vh;
      overflow-y: auto;
      background: #fff8ef;
      border-radius: 28px;
      border: 3px solid #f1c27d;
      padding: 14px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.3);
    }

    .renovation-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .renovation-top h2 {
      margin: 0;
      color: #653719;
      font-size: 22px;
    }

    .cafe-scene {
      height: 350px;
      background-image: url("assets/renovation/cafe_bg.png");
      background-size: cover;
      background-position: center center;
      border: 3px solid #d69456;
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 20px rgba(90,56,37,0.1);
      margin-bottom: 12px;
    }

    .scene-darken {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.06));
      pointer-events: none;
    }

    .scene-chair {
      position: absolute;
      display: none;
      width: 72px;
      height: 72px;
      background-image: url("assets/renovation/chairs.png");
      background-repeat: no-repeat;
      background-size: 300% 100%;
      filter: drop-shadow(0 7px 6px rgba(0,0,0,0.28));
      z-index: 5;
    }

    .chairs-visible .scene-chair {
      display: block;
    }

    .scene-chair.wood { background-position: 0% 50%; }
    .scene-chair.blue { background-position: 50% 50%; }
    .scene-chair.pink { background-position: 100% 50%; }

    .scene-chair.c1 {
      right: 64px;
      bottom: 72px;
      transform: scale(0.82);
    }

    .scene-chair.c2 {
      right: 30px;
      bottom: 30px;
      transform: scale(0.72);
    }

    .scene-chair.c3 {
      right: 104px;
      bottom: 30px;
      transform: scale(0.68);
    }

    .scene-stain {
      position: absolute;
      width: 76px;
      height: 48px;
      background-image: url("assets/renovation/stains.png");
      background-repeat: no-repeat;
      background-size: 300% 200%;
      filter: drop-shadow(0 0 8px rgba(255,183,3,0.9));
      cursor: pointer;
      z-index: 8;
      animation: stainPulse 1.8s infinite ease-in-out;
    }

    .scene-stain.cleanable {
      outline: 3px solid rgba(255,183,3,0.85);
      border-radius: 50%;
    }

    .stain1 {
      left: 90px;
      top: 178px;
      background-position: 0% 0%;
      transform: rotate(-8deg) scale(0.75);
    }

    .stain2 {
      left: 154px;
      top: 192px;
      background-position: 50% 0%;
      transform: rotate(6deg) scale(0.72);
    }

    .stain3 {
      left: 220px;
      top: 164px;
      background-position: 100% 0%;
      transform: rotate(-4deg) scale(0.72);
    }

    @keyframes stainPulse {
      0%,100% { opacity: 0.9; }
      50% { opacity: 1; filter: drop-shadow(0 0 15px rgba(255,183,3,1)); }
    }

    .scene-hotspot {
      position: absolute;
      border: 3px dashed rgba(255,255,255,0.85);
      border-radius: 18px;
      box-shadow: 0 0 15px rgba(255,183,3,0.8);
      display: none;
      z-index: 7;
      pointer-events: none;
    }

    .chairs-task .chair-zone {
      display: block;
    }

    .chair-zone {
      right: 36px;
      bottom: 28px;
      width: 150px;
      height: 110px;
    }

    .sign-fixed-badge,
    .display-badge,
    .decor-badge,
    .plant-badge {
      position: absolute;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.82);
      border: 3px solid #ffb24a;
      box-shadow: 0 0 18px rgba(255,183,3,0.75);
      z-index: 9;
    }

    .sign-fixed .sign-fixed-badge {
      display: flex;
      left: 74px;
      top: 24px;
      width: 48px;
      height: 48px;
    }

    .display-visible .display-badge {
      display: flex;
      left: 22px;
      top: 146px;
      width: 48px;
      height: 48px;
    }

    .decor-visible .decor-badge {
      display: flex;
      left: 202px;
      top: 38px;
      width: 48px;
      height: 48px;
    }

    .plant-visible .plant-badge {
      display: flex;
      right: 118px;
      top: 108px;
      width: 48px;
      height: 48px;
    }

    .task-box {
      background: white;
      border: 2px solid #f1c27d;
      border-radius: 22px;
      padding: 13px;
      box-shadow: 0 5px 13px rgba(90,56,37,0.09);
    }

    .task-box h3 {
      margin: 0 0 6px;
      color: #653719;
      font-size: 20px;
    }

    .task-box p {
      margin: 5px 0;
      line-height: 1.35;
      font-size: 14px;
    }

    .choice-row {
      display: flex;
      gap: 9px;
      margin-top: 10px;
    }

    .choice {
      flex: 1;
      background: #fff3e8;
      border: 2px solid #f1c27d;
      border-radius: 17px;
      padding: 10px 6px;
      text-align: center;
      font-weight: 900;
      cursor: pointer;
      position: relative;
      box-shadow: 0 4px 9px rgba(90,56,37,0.08);
    }

    .choice.selected {
      border-color: #4caf7a;
      box-shadow: 0 0 0 3px rgba(76,175,122,0.18);
    }

    .chair-preview {
      height: 76px;
      width: 76px;
      margin: 0 auto 7px;
      background-image: url("assets/renovation/chairs.png");
      background-repeat: no-repeat;
      background-size: 300% 100%;
      filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
    }

    .chair-wood { background-position: 0% 50%; }
    .chair-blue { background-position: 50% 50%; }
    .chair-pink { background-position: 100% 50%; }

    .choice small {
      display: block;
      color: #8b5e34;
      margin-top: 3px;
      font-size: 11px;
    }

    .scene-chair,
    .chair-preview {
      display: none !important;
      background-image: none !important;
    }

    .scene-stain {
      background-image: none !important;
      width: 58px;
      height: 48px;
      background: rgba(255, 248, 239, 0.86);
      border: 3px solid #ffb703;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scene-stain::before {
      content: "🧽";
      font-size: 28px;
    }

    .chairs-badge {
      position: absolute;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.84);
      border: 3px solid #ffb24a;
      box-shadow: 0 0 18px rgba(255,183,3,0.75);
      z-index: 9;
      right: 58px;
      bottom: 70px;
      width: 54px;
      height: 54px;
    }

    .chairs-visible .chairs-badge {
      display: flex;
    }

    .reno-progress {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin: 10px 0 12px;
    }

    .reno-mini-card {
      background: #ffffff;
      border: 2px solid #f1c27d;
      border-radius: 17px;
      padding: 9px;
      box-shadow: 0 4px 10px rgba(90,56,37,0.08);
    }

    .reno-mini-card.current {
      border-color: #ff8c1a;
      box-shadow: 0 0 0 3px rgba(255,140,26,0.18);
    }

    .reno-mini-card.done {
      border-color: #4caf7a;
      background: #f2fff5;
    }

    .reno-mini-title {
      font-size: 12px;
      font-weight: 900;
      color: #653719;
      margin-bottom: 4px;

    .reno-task-action-grid {

    .reno-style-btn {

    @keyframes readyPulse {

    .needs-pill {

    .story-name {

    .story-card, .unlock-card, .order-row {

    .fame-card {
      width: min(420px, 100%);
      background: #fff8ef;

      text-align: center;
      box-shadow: 0 18px 45px rgba(0,0,0,0.35);

    }

    @keyframes rankPop {
      from { transform: scale(0.7); opacity: 0; }

    }

    .rank-big { font-size: 58px; margin-bottom: 8px; }
    .rank-title { font-size: 27px; font-weight: 900; color: #653719; margin-bottom: 6px; }
    .rank-name { font-size: 20px; font-weight: 900; color: #ff8c1a; margin-bottom: 10px; }

        max-width: 520px;

    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <div class="title-row">
        <div class="logo">☕</div>
        <h1>Mini Merge Cafe</h1>
        <div class="gear" onclick="openInfoPanel()">ℹ️</div>
      </div>

      <div class="stats">
        <div class="stat-pill" id="coinsText">🪙 0</div>
        <div class="stat-pill" id="gemsText">💎 25</div>
        <div class="stat-pill" id="partsText">🔧 0</div>
        <div class="stat-pill" id="energyText">⚡ 30/75</div>
      </div>
    </div>

    <div class="orders-section">
      <div class="section-ribbon">Today's Orders</div>
      <div class="customers" id="customers"></div>
    </div>

    <div class="board-frame">
      <div class="board-label">MERGE BOARD</div>
      <div class="board" id="board"></div>
    </div>

    <div class="hint-bubble">
      <div class="helper">🐱</div>
      <div class="message" id="message">Merge matching items to serve customers!</div>
      <div class="bulb">💡</div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" onclick="openSheet('goals', this)">🎯<span>Goals</span></button>
    <button class="nav-btn" onclick="openSheet('fame', this)">⭐<span>Fame</span></button>
    <button class="nav-btn" onclick="openSheet('gift', this)">🎁<span>Gift</span></button>
    <button class="nav-btn" onclick="openSheet('shop', this)">🛒<span>Shop</span></button>
  </div>

  <div class="sheet" id="sheet">
    <div class="sheet-header">
      <h2 id="sheetTitle">Panel</h2>
      <button class="close-btn" onclick="closeSheet()">Close</button>
    </div>
    <div id="sheetContent"></div>
  </div>

  <div class="renovation-modal" id="renovationModal">
    <div class="renovation-card">
      <div class="renovation-top">
        <h2>🏡 Cafe Renovation</h2>
        <button class="close-btn" onclick="closeRenovation()">Close</button>
      </div>

      <div class="cafe-scene" id="cafeScene">
        <div class="scene-darken"></div>

        <div class="scene-hotspot chair-zone"></div>

        <div class="scene-stain stain1" id="stain1" onclick="cleanStain(1)"></div>
        <div class="scene-stain stain2" id="stain2" onclick="cleanStain(2)"></div>
        <div class="scene-stain stain3" id="stain3" onclick="cleanStain(3)"></div>

        <div class="scene-chair c1" id="chair1"></div>
        <div class="scene-chair c2" id="chair2"></div>
        <div class="scene-chair c3" id="chair3"></div>

        <div class="sign-fixed-badge">✨</div>
        <div class="display-badge">🧁</div>
        <div class="decor-badge">🖼️</div>
        <div class="plant-badge">🪴</div>
        <div class="chairs-badge">🪑</div>
      </div>

      <div class="reno-progress" id="renoProgress"></div>

      <div class="task-box">
        <h3 id="taskTitle">Current Task</h3>
        <p id="taskDesc"></p>
        <p id="taskReq"></p>
        <div id="taskAction"></div>
      </div>
    </div>
  </div>

  <script>
    const items = [
      { name: "Cookie", emoji: "🍪", chain: "dessert", level: 1 },
      { name: "Cupcake", emoji: "🧁", chain: "dessert", level: 2 },
      { name: "Cake", emoji: "🍰", chain: "dessert", level: 3 },
      { name: "Special Cake", emoji: "🎂", chain: "dessert", level: 4 },
      { name: "Bean", emoji: "🫘", chain: "drink", level: 1 },
      { name: "Coffee", emoji: "☕", chain: "drink", level: 2 },
      { name: "Latte", emoji: "🥤", chain: "drink", level: 3 },
      { name: "Fancy Drink", emoji: "🍹", chain: "drink", level: 4 }
    ];

    const mergeMap = { 0: 1, 1: 2, 2: 3, 4: 5, 5: 6, 6: 7 };

    const storyProfiles = [
      {
        id: "leyla", avatar: "👵", name: "Grandma Leyla", favorite: "Coffee",
        visits: 0, unlocked: 0,
        costs: [80, 160, 260],
        stories: [
          "Leyla says this cafe reminds her of Sunday mornings with her husband.",
          "She starts bringing old neighborhood photos and becomes your first loyal regular.",
          "Leyla recommends the cafe to everyone in the neighborhood. Reputation bonus unlocked."
        ]
      },
      {
        id: "mert", avatar: "🧑", name: "Student Mert", favorite: "Cupcake",
        visits: 0, unlocked: 0,
        costs: [70, 150, 240],
        stories: [
          "Mert studies here because the cafe feels calmer than the library.",
          "He shares the cafe with his classmates after a difficult exam week.",
          "Mert creates a small study group here. More young customers notice the cafe."
        ]
      },
      {
        id: "ada", avatar: "👱‍♀️", name: "Influencer Ada", favorite: "Latte",
        visits: 0, unlocked: 0,
        costs: [120, 220, 340],
        stories: [
          "Ada posts her first photo from the cafe and calls it a hidden gem.",
          "Her followers start asking where the cafe is. Trendy Spot progress begins.",
          "Ada's weekend post goes viral. VIP-style orders start appearing more often."
        ]
      },
      {
        id: "chef", avatar: "🧔", name: "Chef Bora", favorite: "Cake",
        visits: 0, unlocked: 0,
        costs: [140, 250, 380],
        stories: [
          "Bora tastes your dessert and says the cafe has real potential.",
          "He gives you a small menu idea that makes desserts more valuable.",
          "Bora becomes a secret mentor. Dessert rewards improve."
        ]
      }
    ];

    const fameRanks = [
      { name: "Unknown Cafe", need: 0, reward: "Customer stories unlocked." },
      { name: "Local Favorite", need: 45, reward: "Extra customer slot can be unlocked with coins." },
      { name: "Trendy Spot", need: 120, reward: "Cake orders and menu research become more useful." },
      { name: "Famous Cafe", need: 240, reward: "Fancy Drink VIP orders unlocked." },
      { name: "City Icon", need: 430, reward: "Your cafe becomes a city icon." }
    ];

    function makeItem(item, opts = {}) {
      return { item, lucky: opts.lucky || false, chainBadge: opts.chainBadge || false };
    }

    const boardSize = 30;

    let board = Array(boardSize).fill(null);
    board[5] = { machine: "drink" };
    board[24] = { machine: "dessert" };

    let coins = 0;
    let gems = 25;
    let parts = 0;
    let energy = 30;
    let maxEnergy = 75;
    let drinkMachineLevel = 1;
    let dessertMachineLevel = 1;
    let cafeLevel = 1;
    let famePoints = 0;
    let fameRank = 0;
    let totalServed = 0;
    let customerSlots = 3;
    let menuResearch = { dessert: false, vip: false };
    let selectedIndex = null;
    let draggedIndex = null;
    let suppressTap = false;
    const pointerDrag = {
      pointerId: null,
      from: null,
      startX: 0,
      startY: 0,
      active: false,
      moved: false,
      target: null,
      ghost: null
    };
    let newItemIndex = null;
    let mergedItemIndex = null;
    let customers = [];
    let giftProgress = 0;
    let giftReady = false;
    let ordersSinceLastPart = 0;
    let adCooldown = false;
    let adCooldownSeconds = 0;
    let adTimer = null;

    const boardEl = document.getElementById("board");
    const customersEl = document.getElementById("customers");
    const messageEl = document.getElementById("message");

    function playSound(type) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = type === "error" ? 180 : type === "order" ? 760 : type === "merge" ? 520 : 900;
        gain.gain.setValueAtTime(0.06, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
        osc.start();
        osc.stop(ctx.currentTime + 0.12);
      } catch(e) {}
    }

    function setMsg(text) { messageEl.textContent = text; }

    function createBoard() {
      boardEl.innerHTML = "";
      for (let i = 0; i < boardSize; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.dataset.index = i;
        if (i === selectedIndex) cell.classList.add("selected");
        if (i === newItemIndex || i === mergedItemIndex) cell.classList.add("pop");

        const data = board[i];

        cell.addEventListener("pointerdown", pointerDown);

        if (data && data.machine) {
          const type = data.machine;
          cell.classList.add("machine", type === "drink" ? "drink-machine" : "dessert-machine");
          cell.innerHTML = `<div>${getMachineEmoji(type)}</div><div class="machine-label">${type === "drink" ? "Drink" : "Dessert"} Lv.${type === "drink" ? drinkMachineLevel : dessertMachineLevel}</div>`;
        } else if (data && data.item !== undefined) {
          if (data.lucky) cell.classList.add("lucky-cell");
          const item = items[data.item];
          cell.innerHTML = `<div class="item">${item.emoji}</div><div class="item-name">${item.name}</div>`;
          if (data.lucky) addBadge(cell, "✨", "badge-lucky");
          if (data.chainBadge) addBadge(cell, "⭐", "badge-star");
          if (isOrderReady(data.item)) addBadge(cell, "✓", "badge-ready");
        }

        boardEl.appendChild(cell);
      }
      setTimeout(() => { newItemIndex = null; mergedItemIndex = null; }, 400);
    }

    function addBadge(cell, text, cls) {
      const b = document.createElement("div");
      b.className = "mini-badge " + cls;
      b.textContent = text;
      cell.appendChild(b);
    }

    function getMachineEmoji(type) {
      const lvl = type === "drink" ? drinkMachineLevel : dessertMachineLevel;
      if (type === "drink") return lvl === 1 ? "☕" : lvl === 2 ? "🥤" : lvl === 3 ? "🍹" : "🧋";
      return lvl === 1 ? "🍪" : lvl === 2 ? "🧁" : lvl === 3 ? "🍰" : "🎂";
    }

    function pointerDown(e) {
      const index = Number(e.currentTarget.dataset.index);
      const data = board[index];

      if (!data && selectedIndex === null) return;

      e.preventDefault();
      pointerDrag.pointerId = e.pointerId;
      pointerDrag.from = index;
      pointerDrag.startX = e.clientX;
      pointerDrag.startY = e.clientY;
      pointerDrag.active = false;
      pointerDrag.moved = false;
      pointerDrag.target = null;
      suppressTap = false;

      try { e.currentTarget.setPointerCapture(e.pointerId); } catch(err) {}

      window.addEventListener("pointermove", pointerMove, { passive: false });
      window.addEventListener("pointerup", pointerUp, { passive: false });
      window.addEventListener("pointercancel", pointerCancel, { passive: false });
    }

    function pointerMove(e) {
      if (e.pointerId !== pointerDrag.pointerId) return;
      e.preventDefault();

      const dx = e.clientX - pointerDrag.startX;
      const dy = e.clientY - pointerDrag.startY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (!pointerDrag.active && dist > 8 && board[pointerDrag.from]) {
        startPointerDrag(e);
      }

      if (!pointerDrag.active) return;
      pointerDrag.moved = true;
      suppressTap = true;
      moveGhost(e.clientX, e.clientY);

      const cell = cellFromPoint(e.clientX, e.clientY);
      document.querySelectorAll(".cell.drag-over").forEach(c => c.classList.remove("drag-over"));
      if (cell) {
        const target = Number(cell.dataset.index);
        if (target !== pointerDrag.from) {
          pointerDrag.target = target;
          cell.classList.add("drag-over");
        } else {
          pointerDrag.target = null;
        }
      } else {
        pointerDrag.target = null;
      }
    }

    function pointerUp(e) {
      if (e.pointerId !== pointerDrag.pointerId) return;
      e.preventDefault();

      const wasDragging = pointerDrag.active && pointerDrag.moved;
      const from = pointerDrag.from;
      const target = pointerDrag.target;

      cleanupPointerDrag();

      if (wasDragging && target !== null && target !== undefined) {
        moveOrMerge(from, target);
        selectedIndex = target;
        updateAll();
      } else {
        handleBoardTap(from);
      }

      resetPointerDrag();
      removePointerListeners();
    }

    function pointerCancel() {
      cleanupPointerDrag();
      resetPointerDrag();
      removePointerListeners();
    }

    function removePointerListeners() {
      window.removeEventListener("pointermove", pointerMove);
      window.removeEventListener("pointerup", pointerUp);
      window.removeEventListener("pointercancel", pointerCancel);
    }

    function startPointerDrag(e) {
      const data = board[pointerDrag.from];
      if (!data) return;
      const ghost = document.createElement("div");
      ghost.className = "drag-ghost";
      ghost.textContent = getBoardObjectEmoji(data);
      document.body.appendChild(ghost);
      pointerDrag.ghost = ghost;
      pointerDrag.active = true;
      moveGhost(e.clientX, e.clientY);
    }

    function moveGhost(x, y) {
      if (!pointerDrag.ghost) return;
      pointerDrag.ghost.style.left = x + "px";
      pointerDrag.ghost.style.top = y + "px";
    }

    function cellFromPoint(x, y) {
      const el = document.elementFromPoint(x, y);
      return el ? el.closest(".cell") : null;
    }

    function cleanupPointerDrag() {
      if (pointerDrag.ghost && pointerDrag.ghost.parentNode) pointerDrag.ghost.parentNode.removeChild(pointerDrag.ghost);
      document.querySelectorAll(".cell.drag-over").forEach(c => c.classList.remove("drag-over"));
    }

    function resetPointerDrag() {
      pointerDrag.pointerId = null;
      pointerDrag.from = null;
      pointerDrag.startX = 0;
      pointerDrag.startY = 0;
      pointerDrag.active = false;
      pointerDrag.moved = false;
      pointerDrag.target = null;
      pointerDrag.ghost = null;
    }

    function getBoardObjectEmoji(data) {
      if (!data) return "";
      if (data.machine) return getMachineEmoji(data.machine);
      return items[data.item].emoji;
    }

    function handleBoardTap(index) {
      const data = board[index];
      if (data && data.machine && selectedIndex === null) {
        selectedIndex = index;
        generateItem(data.machine);
        return;
      }
      tapCell(index);
    }

    function tapCell(index) {
      if (selectedIndex === null) {
        if (board[index]) {
          selectedIndex = index;
          setMsg("Selected! Tap target or press Info.");
          createBoard();
        }
        return;
      }
      if (selectedIndex === index) {
        selectedIndex = null;
        setMsg("Selection cancelled.");
        createBoard();
        return;
      }
      moveOrMerge(selectedIndex, index);
      selectedIndex = null;
      updateAll();
    }

    function moveOrMerge(from, to) {
      const a = board[from];
      const b = board[to];
      if (!a) return;

      if (!b) {
        board[to] = a;
        board[from] = null;
        selectedIndex = to;
        setMsg(a.machine ? "Machine moved." : "Item moved.");
        return;
      }

      if (a.machine || b.machine) {
        setMsg("Machines can move, but they do not merge.");
        playSound("error");
        return;
      }

      if (a.item === b.item && mergeMap[a.item] !== undefined) {
        const newItem = mergeMap[a.item];
        board[to] = makeItem(newItem, { lucky: a.lucky || b.lucky, chainBadge: newItem === 7 || a.chainBadge || b.chainBadge });
        board[from] = null;
        selectedIndex = to;
        mergedItemIndex = to;
        setMsg(newItem === 7 ? "Fancy Drink completed! ⭐" : ((a.lucky || b.lucky) ? "Lucky merge! ✨" : "Nice merge!"));
        playSound("merge");
        return;
      }
      setMsg("Only same items merge.");
      playSound("error");
    }

    function generateItem(type) {
      if (energy <= 0) { setMsg("No energy. Use Gift, Recycle or Boost."); playSound("error"); return; }
      const empty = [];
      for (let i = 0; i < boardSize; i++) if (board[i] === null) empty.push(i);
      if (empty.length === 0) { setMsg("Board full. Merge or recycle."); playSound("error"); return; }
      energy--;
      const slot = empty[Math.floor(Math.random() * empty.length)];
      const item = getMachineItem(type);
      const lucky = Math.random() < 0.08;
      board[slot] = makeItem(item, { lucky });
      newItemIndex = slot;
      setMsg(lucky ? "Lucky item! ✨" : "New item!");
      playSound("upgrade");
      updateAll();
    }

    function getMachineItem(type) {
      const level = type === "drink" ? drinkMachineLevel : dessertMachineLevel;
      const r = Math.random();
      if (type === "dessert") {
        if (level === 1) return 0;
        if (level === 2) return r < 0.82 ? 0 : 1;
        if (level === 3) return r < 0.65 ? 0 : r < 0.92 ? 1 : 2;
        return r < 0.5 ? 0 : r < 0.8 ? 1 : r < 0.96 ? 2 : 3;
      }
      if (level === 1) return 4;
      if (level === 2) return r < 0.82 ? 4 : 5;
      if (level === 3) return r < 0.65 ? 4 : r < 0.92 ? 5 : 6;
      return r < 0.5 ? 4 : r < 0.8 ? 5 : r < 0.96 ? 6 : 7;
    }

    function createCustomers() {
      customersEl.innerHTML = "";
      customers.forEach((c, index) => {
        const ready = board.some(x => x && x.item === c.order);
        const card = document.createElement("div");
        card.className = "customer-card" + (ready ? " ready" : "");
        card.innerHTML = `
          ${ready ? `<div class="ready-check">✓</div>` : ""}
          <div class="avatar">${c.profile.avatar}</div>
          <div class="story-name">${c.profile.name}</div>
          <div class="order-emoji">${items[c.order].emoji}</div>
          <div class="order-name">${items[c.order].name}</div>
          <div class="reward"><span>🪙 ${getReward(c.order)}</span>${c.givesPart ? `<span>🔧 +1</span>` : ""}<span>⭐ +${getFameReward(c.order)}</span></div>
          ${ready ? `<button class="serve-btn" onclick="serveCustomer(${index})">Serve</button>` : ``}
        `;
        customersEl.appendChild(card);
      });
    }

    function setupCustomers() {
      customers = [];
      for (let i = 0; i < customerSlots; i++) customers.push(newCustomer());
    }

    function newCustomer(replaceIndex = -1) {
      const usedOrders = customers.map((c, i) => i !== replaceIndex ? c.order : null).filter(x => x !== null);
      let pool = availableOrders().filter(x => !usedOrders.includes(x));
      if (pool.length === 0) pool = availableOrders();
      const profile = storyProfiles[Math.floor(Math.random() * storyProfiles.length)];
      return { profile, avatar: profile.avatar, order: pool[Math.floor(Math.random() * pool.length)], givesPart: orderGivesPart() };
    }

    function availableOrders() {
      let arr = [1, 2, 5, 6];
      if (fameRank >= 2 || menuResearch.dessert) arr.push(3);
      if (fameRank >= 3 || menuResearch.vip) arr.push(7);
      return arr;
    }

    function orderGivesPart() {
      if (ordersSinceLastPart >= 4) return true;
      return Math.random() < 0.25;
    }

    function getReward(itemIndex) {
      const base = { 1: 20, 2: 45, 3: 85, 4: 150 };
      let bonus = 0;
      if (menuResearch.dessert && items[itemIndex].chain === "dessert") bonus += 10;
      if (storyProfiles.some(p => p.unlocked >= 3)) bonus += 5;
      return base[items[itemIndex].level] + fameRank * 5 + bonus;
    }

    function getFameReward(itemIndex) {
      return items[itemIndex].level * 4 + 4;
    }

    function isOrderReady(itemIndex) { return customers.some(c => c.order === itemIndex); }

    function serveCustomer(index) {
      const c = customers[index];
      const boardIndex = board.findIndex(x => x && x.item === c.order);
      if (boardIndex === -1) { setMsg("Order item not ready."); playSound("error"); return; }
      const served = board[boardIndex];
      board[boardIndex] = null;
      let reward = getReward(c.order);
      if (served.lucky) reward += 25;
      const fameGain = getFameReward(c.order) + (served.lucky ? 6 : 0);
      famePoints += fameGain;
      c.profile.visits++;
      totalServed++;

      let partMsg = "";
      if (c.givesPart) { parts++; ordersSinceLastPart = 0; partMsg = " +1 🔧"; }
      else ordersSinceLastPart++;

      giftProgress++;
      customers[index] = newCustomer(index);
      setMsg((served.lucky ? "Lucky order! " : "Served! ") + "+" + reward + " 🪙 +" + fameGain + " ⭐" + partMsg);
      coins += reward;
      playSound("order");
      updateAll();
      checkFameRankUp();
      if (document.getElementById("sheet").classList.contains("show")) refreshOpenSheet();
    }

    function openSheet(type, btn) {
      document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
      if (btn) btn.classList.add("active");
      const sheet = document.getElementById("sheet");
      sheet.dataset.type = type;
      refreshOpenSheet();
      sheet.classList.add("show");
    }

    function refreshOpenSheet() {
      const sheet = document.getElementById("sheet");
      const type = sheet.dataset.type || "goals";
      const title = document.getElementById("sheetTitle");
      const content = document.getElementById("sheetContent");
      if (type === "goals") { title.textContent = "🎯 Goals"; content.innerHTML = renderGoalsPanel(); }
      if (type === "fame") { title.textContent = "⭐ Cafe Fame"; content.innerHTML = renderFamePanel(); }
      if (type === "gift") { title.textContent = "🎁 Gift"; content.innerHTML = renderGiftPanel(); }
      if (type === "shop") { title.textContent = "🛒 Shop"; content.innerHTML = renderShopPanel(); }
      if (type === "info") { title.textContent = "ℹ️ Info"; content.innerHTML = renderInfoPanel(); }
    }

    function closeSheet() { document.getElementById("sheet").classList.remove("show"); }

    function renderGoalsPanel() {
      const readyCount = customers.filter(c => board.some(x => x && x.item === c.order)).length;
      let html = `
        <div class="panel-card">
          <h3>Active Goals</h3>
          <p>${readyCount} order(s) ready now. Ready orders glow on the main screen. Complete orders to gain coins, fame and gifts.</p>
        </div>`;
      customers.forEach((c, i) => {
        const ready = board.some(x => x && x.item === c.order);
        html += `
          <div class="order-row">
            <div class="order-top">
              <div class="order-avatar">${c.profile.avatar}</div>
              <div class="order-body">
                <div class="order-title">${c.profile.name} wants ${items[c.order].emoji} ${items[c.order].name}</div>
                <div class="order-meta">Reward: 🪙 ${getReward(c.order)} · ⭐ ${getFameReward(c.order)}${c.givesPart ? " · 🔧 +1" : ""}</div>
              </div>
              ${ready ? `<button class="ready-serve-mini" onclick="serveCustomer(${i}); refreshOpenSheet();">Serve</button>` : ``}
            </div>
          </div>`;
      });
      return html;
    }

    function renderFamePanel() {
      const next = fameRanks[fameRank + 1];
      const currentNeed = fameRanks[fameRank].need;
      const nextNeed = next ? next.need : fameRanks[fameRank].need;
      const pct = next ? Math.min(100, Math.round((famePoints - currentNeed) / (nextNeed - currentNeed) * 100)) : 100;
      let html = `
        <div class="fame-hero">
          <div class="fame-rank-title">⭐ ${fameRanks[fameRank].name}</div>
          <div class="fame-rank-sub">Fame: ${famePoints}${next ? " / " + next.need : " MAX"}</div>
          <div class="fame-bar"><div class="fame-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="unlock-card">
          <h3>Spend Coins</h3>
          <p>Coins now unlock useful progress, not just numbers.</p>
          <button class="orange-btn" onclick="unlockExtraCustomerSlot()" ${customerSlots >= 4 || fameRank < 1 ? "disabled" : ""}>Unlock 4th Customer Slot - 300 🪙</button>
          <button class="blue-btn" onclick="buyMenuResearch('dessert')" ${menuResearch.dessert ? "disabled" : ""}>Dessert Menu Research - 220 🪙</button>
          <button class="green-btn" onclick="buyMenuResearch('vip')" ${menuResearch.vip || fameRank < 2 ? "disabled" : ""}>VIP Drink Research - 360 🪙</button>
        </div>
        <div class="panel-card"><h3>Customer Stories</h3><p>Serve the same customers, then spend coins to unlock story parts and Fame rewards.</p></div>`;

      storyProfiles.forEach(p => {
        const nextStory = p.unlocked < p.stories.length ? p.stories[p.unlocked] : null;
        const canUnlock = nextStory && p.visits >= p.unlocked + 1;
        const cost = p.costs[p.unlocked] || 0;
        html += `
          <div class="story-card">
            <div class="story-top">
              <div class="story-avatar">${p.avatar}</div>
              <div class="story-body">
                <div class="story-title">${p.name}</div>
                <div class="story-meta">Favorite: ${p.favorite} · Visits: ${p.visits} · Story: ${p.unlocked}/3</div>
              </div>
              ${nextStory ? `<button class="small-action-btn" onclick="unlockStory('${p.id}')" ${canUnlock ? "" : "disabled"}>${cost} 🪙</button>` : `<span class="done-badge2">Done ✓</span>`}
            </div>
            ${p.unlocked > 0 ? `<div class="story-text">${p.stories[p.unlocked - 1]}</div>` : `<div class="story-text">Serve this customer to reveal their story.</div>`}
            ${nextStory && !canUnlock ? `<p style="font-size:12px;font-weight:900;color:#8b5e34;margin-top:7px;">Need ${p.unlocked + 1} visit(s) to unlock next story.</p>` : ""}
          </div>`;
      });
      return html;
    }

    function openInfoPanel() {
      if (selectedIndex === null || !board[selectedIndex]) {
        setMsg("Select an item or machine first, then tap Info.");
        openSheet("info", null);
        return;
      }
      openSheet("info", null);
    }

    function renderInfoPanel() {
      if (selectedIndex === null || !board[selectedIndex]) {
        return `
          <div class="panel-card">
            <h3>ℹ️ Item Info</h3>
            <p>Select any item or machine on the board first. Then tap the Info button again.</p>
          </div>`;
      }

      const data = board[selectedIndex];

      if (data.machine) {
        const type = data.machine;
        const lvl = type === "drink" ? drinkMachineLevel : dessertMachineLevel;
        const cost = upgradeCost(type);
        const produces = getMachineProductionText(type);
        return `
          <div class="panel-card">
            <h3>${getMachineEmoji(type)} ${type === "drink" ? "Drink Machine" : "Dessert Machine"}</h3>
            <p><b>Level:</b> ${lvl}</p>
            <p><b>Produces:</b> ${produces}</p>
            <p><b>How it works:</b> Tap the machine to produce items. Drag it to move it on the board.</p>
            <p><b>Upgrade:</b> ${lvl >= 4 ? "Max level reached." : "Cost: " + cost + " 🔧"}</p>
            <button class="${type === "drink" ? "blue-btn" : "orange-btn"}" onclick="upgradeMachine('${type}'); refreshOpenSheet();" ${lvl >= 4 ? "disabled" : ""}>${lvl >= 4 ? "Max Level" : "Upgrade Machine"}</button>
          </div>`;
      }

      const item = items[data.item];
      const chain = item.chain === "drink" ? ["Bean", "Coffee", "Latte", "Fancy Drink"] : ["Cookie", "Cupcake", "Cake", "Special Cake"];
      const nextIndex = mergeMap[data.item];
      const nextText = nextIndex !== undefined ? items[nextIndex].emoji + " " + items[nextIndex].name : "Max level";
      const how = item.level === 1 ? (item.chain === "drink" ? "Produced by Drink Machine." : "Produced by Dessert Machine.") : "Merge two " + item.name + " items from the previous level.";

      return `
        <div class="panel-card">
          <h3>${item.emoji} ${item.name}</h3>
          <p><b>Product name:</b> ${item.name}</p>
          <p><b>How to make:</b> ${how}</p>
          <p><b>Merge chain:</b> ${chain.join(" → ")}</p>
          <p><b>Next merge:</b> ${nextText}</p>
          ${data.lucky ? `<p><b>Lucky:</b> This item gives extra reward when served.</p>` : ""}
          ${data.chainBadge ? `<p><b>Badge:</b> ⭐ Special completed item.</p>` : ""}
        </div>`;
    }

    function getMachineProductionText(type) {
      const lvl = type === "drink" ? drinkMachineLevel : dessertMachineLevel;
      if (type === "drink") {
        if (lvl === 1) return "Bean";
        if (lvl === 2) return "Mostly Bean, sometimes Coffee";
        if (lvl === 3) return "Bean, Coffee, rarely Latte";
        return "Bean, Coffee, Latte, rarely Fancy Drink";
      }
      if (lvl === 1) return "Cookie";
      if (lvl === 2) return "Mostly Cookie, sometimes Cupcake";
      if (lvl === 3) return "Cookie, Cupcake, rarely Cake";
      return "Cookie, Cupcake, Cake, rarely Special Cake";
    }

    function renderGiftPanel() {
      return `
        <div class="panel-card">
          <h3>Gift Box</h3>
          <p>${giftReady ? "Gift ready! Claim +8 energy." : "Serve " + giftProgress + "/3 customers to unlock."}</p>
          <button class="green-btn" onclick="claimGift(); refreshOpenSheet();" ${giftReady ? "" : "disabled"}>${giftReady ? "Claim +8 ⚡" : "Locked"}</button>
        </div>
        <div class="panel-card">
          <h3>Recycle</h3>
          <p>Select an item on the board. Recycle it for energy.</p>
          <button class="green-btn" onclick="recycleSelected(); refreshOpenSheet();">Recycle Selected Item</button>
        </div>
        <div class="panel-card">
          <h3>Energy Boost</h3>
          <p>Watch a short ad break to get +15 energy.</p>
          <button class="blue-btn" onclick="watchAd(); refreshOpenSheet();" ${adCooldown ? "disabled" : ""}>${adCooldown ? "Available in " + adCooldownSeconds + "s" : "Watch Ad +15 ⚡"}</button>
        </div>`;
    }

    function renderShopPanel() {
      return `
        <div class="panel-card">
          <h3>💎 Gem Shop</h3>
          <p>Gems are added as a future premium currency. Later, this can be connected to real App Store / Google Play purchases.</p>
          <p><b>Your gems:</b> 💎 ${gems}</p>
          <button class="green-btn" onclick="buyEnergyWithGems(10, 6); refreshOpenSheet();">Buy +10 Energy - 6 💎</button>
          <button class="blue-btn" onclick="buyEnergyWithGems(25, 14); refreshOpenSheet();">Buy +25 Energy - 14 💎</button>
          <button class="orange-btn" onclick="prototypeBuyGems(); refreshOpenSheet();">Prototype Gem Pack +25 💎</button>
          <div class="info-note">Note: Prototype Gem Pack is free for testing now. Later this button can become a real payment product.</div>
        </div>`;
    }

    function buyEnergyWithGems(amount, cost) {
      if (gems < cost) { setMsg("Need " + cost + " 💎."); playSound("error"); return; }
      if (energy >= maxEnergy) { setMsg("Energy is already full."); return; }
      gems -= cost;
      energy = Math.min(maxEnergy, energy + amount);
      setMsg("Energy purchased! +" + amount + " ⚡");
      playSound("upgrade");
      updateAll();
    }

    function prototypeBuyGems() {
      gems += 25;
      setMsg("Prototype gem pack added! +25 💎");
      playSound("upgrade");
      updateAll();
    }

    function refreshOrdersWithCoins() {
      if (coins < 35) { setMsg("Need 35 coins to refresh orders."); playSound("error"); return; }
      coins -= 35;
      setupCustomers();
      setMsg("Orders refreshed! New customers arrived.");
      updateAll();
      refreshOpenSheet();
    }

    function unlockExtraCustomerSlot() {
      if (customerSlots >= 4) return;
      if (fameRank < 1) { setMsg("Reach Local Favorite first."); return; }
      if (coins < 300) { setMsg("Need 300 coins."); playSound("error"); return; }
      coins -= 300;
      customerSlots = 4;
      customers.push(newCustomer());
      famePoints += 25;
      setMsg("4th customer slot unlocked! +25 ⭐");
      updateAll();
      checkFameRankUp();
      refreshOpenSheet();
    }

    function buyMenuResearch(type) {
      const cost = type === "dessert" ? 220 : 360;
      if (menuResearch[type]) return;
      if (type === "vip" && fameRank < 2) { setMsg("Reach Trendy Spot first."); return; }
      if (coins < cost) { setMsg("Need " + cost + " coins."); playSound("error"); return; }
      coins -= cost;
      menuResearch[type] = true;
      famePoints += type === "dessert" ? 35 : 60;
      parts += type === "dessert" ? 1 : 2;
      setMsg((type === "dessert" ? "Dessert" : "VIP Drink") + " research complete! Fame gained.");
      updateAll();
      checkFameRankUp();
      refreshOpenSheet();
    }

    function unlockStory(id) {
      const p = storyProfiles.find(x => x.id === id);
      if (!p || p.unlocked >= p.stories.length) return;
      if (p.visits < p.unlocked + 1) { setMsg("Serve this customer more to unlock the story."); return; }
      const cost = p.costs[p.unlocked];
      if (coins < cost) { setMsg("Need " + cost + " coins."); playSound("error"); return; }
      coins -= cost;
      p.unlocked++;
      const fameGain = 20 + p.unlocked * 10;
      famePoints += fameGain;
      if (p.unlocked === 3) parts += 1;
      setMsg("Story unlocked: " + p.name + "! +" + fameGain + " ⭐");
      playSound("upgrade");
      updateAll();
      checkFameRankUp();
      refreshOpenSheet();
    }

    function checkFameRankUp() {
      const next = fameRanks[fameRank + 1];
      if (!next) return;
      if (famePoints >= next.need) {
        fameRank++;
        cafeLevel = fameRank + 1;
        const reward = fameRanks[fameRank].reward;
        energy = Math.min(maxEnergy, energy + 10);
        parts += 1;
        showRankUp(reward);
        updateAll();
      }
    }

    function showRankUp(reward) {
      let modal = document.getElementById("fameRankModal");
      if (!modal) {
        modal = document.createElement("div");
        modal.id = "fameRankModal";
        modal.className = "fame-modal";
        modal.innerHTML = `<div class="fame-card"><div class="rank-big">⭐</div><div class="rank-title">Fame Rank Up!</div><div class="rank-name" id="rankNameText"></div><div class="rank-reward" id="rankRewardText"></div><button class="green-btn" onclick="closeRankUp()">Continue</button></div>`;
        document.body.appendChild(modal);
      }
      document.getElementById("rankNameText").textContent = fameRanks[fameRank].name;
      document.getElementById("rankRewardText").textContent = "Unlocked: " + reward + " Reward: +10 ⚡ +1 🔧";
      modal.classList.add("show");
      playSound("upgrade");
    }

    function closeRankUp() {
      const modal = document.getElementById("fameRankModal");
      if (modal) modal.classList.remove("show");
    }

    function claimGift() {
      if (!giftReady) return;
      energy = Math.min(maxEnergy, energy + 8);
      giftProgress = 0;
      giftReady = false;
      setMsg("Gift claimed! +8 ⚡");
      playSound("upgrade");
      updateAll();
    }

    function recycleSelected() {
      if (selectedIndex === null || !board[selectedIndex]) { setMsg("Select an item first."); playSound("error"); return; }
      const obj = board[selectedIndex];
      if (obj.machine) { setMsg("Machines cannot be recycled."); playSound("error"); return; }
      const gain = Math.min(6, items[obj.item].level + (obj.lucky ? 1 : 0));
      board[selectedIndex] = null;
      selectedIndex = null;
      energy = Math.min(maxEnergy, energy + gain);
      setMsg("Recycled! +" + gain + " ⚡");
      playSound("upgrade");
      updateAll();
    }

    function watchAd() {
      if (adCooldown) return;
      let seconds = 5;
      setMsg("Ad break... 5s");
      adCooldown = true;
      const countdown = setInterval(() => {
        seconds--;
        setMsg("Ad break... " + seconds + "s");
        if (seconds <= 0) {
          clearInterval(countdown);
          energy = Math.min(maxEnergy, energy + 15);
          setMsg("Ad reward! +15 ⚡");
          playSound("upgrade");
          startAdCooldown();
          updateAll();
          if (document.getElementById("sheet").classList.contains("show")) refreshOpenSheet();
        }
      }, 1000);
    }

    function startAdCooldown() {
      adCooldownSeconds = 60;
      if (adTimer) clearInterval(adTimer);
      adTimer = setInterval(() => {
        adCooldownSeconds--;
        if (adCooldownSeconds <= 0) { clearInterval(adTimer); adCooldown = false; }
        if (document.getElementById("sheet").classList.contains("show")) refreshOpenSheet();
      }, 1000);
    }

    function upgradeMachine(type) {
      const lvl = type === "drink" ? drinkMachineLevel : dessertMachineLevel;
      if (lvl >= 4) { setMsg("Machine already max."); return; }
      const cost = upgradeCost(type);
      if (parts < cost) { setMsg("Need " + cost + " 🔧."); playSound("error"); return; }
      parts -= cost;
      if (type === "drink") drinkMachineLevel++; else dessertMachineLevel++;
      energy = Math.min(maxEnergy, energy + 10);
      famePoints += 10;
      setMsg("Machine upgraded! +10 ⚡ +10 ⭐");
      playSound("upgrade");
      updateAll();
      checkFameRankUp();
    }

    function upgradeCost(type) {
      const lvl = type === "drink" ? drinkMachineLevel : dessertMachineLevel;
      return lvl === 1 ? 3 : lvl === 2 ? 6 : lvl === 3 ? 10 : 999;
    }

    function updateAll() {
      cafeLevel = fameRank + 1;
      document.getElementById("coinsText").textContent = "🪙 " + coins;
      document.getElementById("gemsText").textContent = "💎 " + gems;
      document.getElementById("partsText").textContent = "🔧 " + parts;
      document.getElementById("energyText").textContent = "⚡ " + energy + "/" + maxEnergy;
      giftReady = giftProgress >= 3;
      createBoard();
      createCustomers();
    }

    function openRenovation() { openSheet("fame", document.querySelectorAll(".nav-btn")[1]); }
    function closeRenovation() {}
    function cleanStain() {}

    setupCustomers();
    updateAll();
    generateItem("drink");
    generateItem("dessert");
    generateItem("drink");
    setMsg("Merge matching items. Ready customers glow instantly!");
  </script>
</body>
</html>
